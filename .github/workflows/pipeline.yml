name: CI/CD


on:
#  push:
#    branches:
#      - main

  workflow_dispatch:


permissions:
  contents: read
  packages: write
  
  
jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint
       
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
        
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration
        
  changes:
    needs:
      - lint
      - unit-test
      - integration-test
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
        
      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v4
        with:
          list-files: shell
          filters: |
            inventory-service:
              - 'services/inventory-service/**'
              - 'shared/**'
              - 'package.json'
              - 'package-lock.json'
              - 'docker/**'
              
            auth-service:
              - 'services/auth-service/**'
              - 'shared/**'
              - 'package.json'
              - 'package-lock.json'
              - 'docker/**'  
      
      - name: Show changed services
        run: |
          echo "Changed services: ${{ steps.filter.outputs.changes }}"
  
  build:
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: inventory-service
          - service: auth-service
            
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Set up Docker Buildx
        if: contains(fromJson(needs.changes.outputs.services), matrix.service) || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v4
        
      - name: Login to GHCR
        if: contains(fromJson(needs.changes.outputs.services), matrix.service) || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Docker metadata
        if: contains(fromJson(needs.changes.outputs.services), matrix.service) || github.event_name == 'workflow_dispatch'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha
            
      - name: Build and push image
        if: contains(fromJson(needs.changes.outputs.services), matrix.service) || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile

          build-args: |
            SERVICE_NAME=${{ matrix.service }}

          push: true

          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          cache-from: type=gha
          cache-to: type=gha,mode=max


