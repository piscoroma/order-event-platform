name: CI/CD


on:
#  push:
#    branches:
#      - main

  workflow_dispatch:


permissions:
  contents: read
  packages: write
  
  
jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint
       
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
        
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration
        
  changes:
    needs:
      - lint
      - unit-test
      - integration-test
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
        
      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v4
        with:
          list-files: shell
          filters: |
            inventory-service:
              - 'services/inventory-service/**'
              - 'shared/**'
              - 'package.json'
              - 'package-lock.json'
              - 'docker/**'
              
            auth-service:
              - 'services/auth-service/**'
              - 'shared/**'
              - 'package.json'
              - 'package-lock.json'
              - 'docker/**'  
      
      - name: Show changed services
        run: |
          echo "Changed services: ${{ steps.filter.outputs.changes }}"
  
  build:
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: inventory-service
          - service: auth-service
            
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Set up Docker Buildx
        if: contains(fromJson(needs.changes.outputs.services), matrix.service) || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v4
            
      - name: Build image
        if: contains(fromJson(needs.changes.outputs.services), matrix.service) || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile

          build-args: |
            SERVICE_NAME=${{ matrix.service }}

          push: false
          load: true
          
          tags: ${{ matrix.service }}:test

          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Save Docker image
        if: contains(fromJson(needs.changes.outputs.services), matrix.service) || github.event_name == 'workflow_dispatch'
        run: |
          docker save \
            -o ${{ matrix.service }}.tar \
            ${{ matrix.service }}:test

      - name: Upload Docker image
        if: contains(fromJson(needs.changes.outputs.services), matrix.service) || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.service }}-image
          path: ${{ matrix.service }}.tar
          
  helm-smoke-test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: inventory-service
            chart: infra/k8s/helm/inventory-service
          
    steps:
      - name: Checkout repository 
        uses: actions/checkout@v6

      - name: Download image
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.service }}-image

      - name: Load Docker image
        run: |
          docker load -i ${{ matrix.service }}.tar

      - name: Create Kind cluster
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: smoke-test

      - name: Load image into Kind
        run: |
          kind load docker-image \
            ${{ matrix.service }}:test \
            --name smoke-test

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Deploy chart
        run: |
          helm upgrade --install \
             ${{ matrix.service }} \
             ${{ matrix.chart }} \
            --set image.repository=${{ matrix.service }} \
            --set image.tag=test \
            --set image.pullPolicy=Never

      - name: Wait rollout
        run: |
          kubectl rollout status deployment/${{ matrix.service }} --timeout=120s

      - name: Show resources
        if: always()
        run: |
          kubectl get all

      - name: Show logs
        if: failure()
        run: |
          kubectl describe pods
          kubectl logs deployment/${{ matrix.service }} --all-containers=true

  push:
    needs:
      - helm-smoke-test
      - changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: inventory-service
          - service: auth-service

    steps:
      - name: Download Docker image
        if: contains(fromJson(needs.changes.outputs.services), matrix.service) || github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v5
        with:
          name: ${{ matrix.service }}-image

      - name: Load Docker image
        if: contains(fromJson(needs.changes.outputs.services), matrix.service) || github.event_name == 'workflow_dispatch'
        run: |
          docker load -i ${{ matrix.service }}.tar

      - name: Login to GHCR
        if: contains(fromJson(needs.changes.outputs.services), matrix.service) || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: contains(fromJson(needs.changes.outputs.services), matrix.service) || github.event_name == 'workflow_dispatch'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Tag image
        if: contains(fromJson(needs.changes.outputs.services), matrix.service) || github.event_name == 'workflow_dispatch'
        run: |
          while IFS= read -r tag; do
            docker tag ${{ matrix.service }}:test "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"

      - name: Push image
        if: contains(fromJson(needs.changes.outputs.services), matrix.service) || github.event_name == 'workflow_dispatch'
        run: |
          while IFS= read -r tag; do
            docker push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"



